{% if items %}
<div class="notification is-warning is-light mb-0" role="status" aria-live="polite">
  <p class="mb-2">{{ message }}</p>
  <ul class="mb-0">
    {% for row in items %}
    <li>{{ row.label }} — granted via group(s): {{ row.groups|join:", " }}</li>
    {% endfor %}
  </ul>
</div>
{% endif %}
