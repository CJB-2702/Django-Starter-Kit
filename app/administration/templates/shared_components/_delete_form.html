{# Inline POST form to delete an object. Requires: delete_url, label (button text), confirm_message #}
<form method="post" action="{{ delete_url }}" onsubmit="return confirm('{{ confirm_message|escapejs }}');" class="is-inline-block">
  {% csrf_token %}
  <button class="button is-small is-danger is-light" type="submit">
    <span class="icon"><span class="material-icons" aria-hidden="true">delete</span></span>
    <span>{{ label|default:"Delete" }}</span>
  </button>
</form>
