{# Wires up dual-listbox sections (filter + assign/remove + select-all/clear). Idempotent — safe to include multiple times per page. #}
<script>
(function () {
  if (window.__adminDualListboxBound) return;
  window.__adminDualListboxBound = true;

  function filterOptions(selectId, query) {
    const sel = document.getElementById(selectId);
    if (!sel) return;
    const q = (query || "").trim().toLowerCase();
    for (const opt of sel.options) {
      opt.hidden = !!q && !opt.textContent.toLowerCase().includes(q);
    }
  }

  function fillHiddenAndSubmit(form, selectId, fieldName) {
    const sel = document.getElementById(selectId);
    const container = form.querySelector(".dual-hidden-inputs");
    container.innerHTML = "";
    if (!sel || !sel.selectedOptions.length) {
      window.alert("Please select an item in the list.");
      return;
    }
    for (const opt of sel.selectedOptions) {
      const inp = document.createElement("input");
      inp.type = "hidden";
      inp.name = fieldName;
      inp.value = opt.value;
      container.appendChild(inp);
    }
    if (!container.children.length) {
      window.alert("Please select an item in the list.");
      return;
    }
    form.submit();
  }

  function selectAllVisible(selectId, chooseVisibleOnly) {
    const sel = document.getElementById(selectId);
    if (!sel) return;
    for (const opt of sel.options) {
      if (chooseVisibleOnly && opt.hidden) continue;
      opt.selected = true;
    }
  }

  document.querySelectorAll(".dual-filter-left, .dual-filter-right").forEach(function (input) {
    input.addEventListener("input", function () {
      filterOptions(input.getAttribute("data-dual-target"), input.value);
    });
  });

  document.querySelectorAll(".dual-listbox-section").forEach(function (section) {
    const sid = section.getAttribute("data-section-id");
    const fieldName = section.getAttribute("data-field-name");
    const formAdd = section.querySelector("#" + sid + "-form-add");
    const formRemove = section.querySelector("#" + sid + "-form-remove");
    const btnChoose = section.querySelector(".dual-choose");
    const btnRemove = section.querySelector(".dual-remove");
    const btnChooseAll = section.querySelector(".dual-choose-all");
    const btnRemoveAll = section.querySelector(".dual-remove-all");
    if (btnChoose && formAdd) btnChoose.addEventListener("click", function () { fillHiddenAndSubmit(formAdd, sid + "-left", fieldName); });
    if (btnRemove && formRemove) btnRemove.addEventListener("click", function () { fillHiddenAndSubmit(formRemove, sid + "-right", fieldName); });
    if (btnChooseAll && formAdd) btnChooseAll.addEventListener("click", function () { selectAllVisible(sid + "-left", true); fillHiddenAndSubmit(formAdd, sid + "-left", fieldName); });
    if (btnRemoveAll && formRemove) btnRemoveAll.addEventListener("click", function () { selectAllVisible(sid + "-right", true); fillHiddenAndSubmit(formRemove, sid + "-right", fieldName); });
  });

  document.querySelectorAll(".dual-clear-filter").forEach(function (el) {
    el.addEventListener("click", function () {
      const sid = el.getAttribute("data-dual-clear");
      const leftF = document.getElementById(sid + "-filter-left");
      const rightF = document.getElementById(sid + "-filter-right");
      if (leftF) { leftF.value = ""; filterOptions(leftF.getAttribute("data-dual-target"), ""); }
      if (rightF) { rightF.value = ""; filterOptions(rightF.getAttribute("data-dual-target"), ""); }
    });
  });
})();
</script>
