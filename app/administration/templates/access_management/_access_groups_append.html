{% for g in groups %}
{% include "access_management/_access_group_row.html" with g=g only %}
{% endfor %}
{% if groups_has_more %}
<tr
  id="access-groups-sentinel"
  hx-get="{% url 'access_management_index' %}?format=htmx-access-groups-append&group_q={{ group_q|urlencode }}&offset={{ groups_next_offset }}"
  hx-trigger="revealed"
  hx-swap="outerHTML"
  hx-push-url="false"
>
  <td colspan="2" class="is-size-7 has-text-grey py-3">
    <span class="htmx-indicator">Loading more…</span>
  </td>
</tr>
{% endif %}
