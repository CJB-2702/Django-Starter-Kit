{% for d in domains %}
{% include "data_ownership/_data_domain_row.html" with d=d only %}
{% endfor %}
{% if domains_has_more %}
<tr
  id="data-domains-sentinel"
  hx-get="{% url 'data_ownership_index' %}?format=htmx-data-domains-append&domain_q={{ domain_q|urlencode }}&offset={{ domains_next_offset }}"
  hx-trigger="revealed"
  hx-swap="outerHTML"
  hx-push-url="false"
>
  <td colspan="2" class="is-size-7 has-text-grey py-3">
    <span class="htmx-indicator">Loading more…</span>
  </td>
</tr>
{% endif %}
