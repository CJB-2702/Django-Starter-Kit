{% for d in divisions %}
{% include "data_ownership/_data_division_row.html" with d=d only %}
{% endfor %}
{% if divisions_has_more %}
<tr
  id="data-divisions-sentinel"
  hx-get="{% url 'data_ownership_index' %}?format=htmx-data-divisions-append&division_q={{ division_q|urlencode }}&offset={{ divisions_next_offset }}"
  hx-trigger="revealed"
  hx-swap="outerHTML"
  hx-push-url="false"
>
  <td colspan="3" class="is-size-7 has-text-grey py-3">
    <span class="htmx-indicator">Loading more…</span>
  </td>
</tr>
{% endif %}
