{% for g in ownership_groups %}
{% include "data_ownership/_data_ownership_group_row.html" with g=g only %}
{% endfor %}
{% if ownership_groups_has_more %}
<tr
  id="data-ownership-groups-sentinel"
  hx-get="{% url 'data_ownership_index' %}?format=htmx-data-ownership-groups-append&ownership_group_q={{ ownership_group_q|urlencode }}&offset={{ ownership_groups_next_offset }}"
  hx-trigger="revealed"
  hx-swap="outerHTML"
  hx-push-url="false"
>
  <td colspan="2" class="is-size-7 has-text-grey py-3">
    <span class="htmx-indicator">Loading more…</span>
  </td>
</tr>
{% endif %}
