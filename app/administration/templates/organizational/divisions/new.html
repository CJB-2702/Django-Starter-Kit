{% extends "adm_base.html" %}
{% block title %}New Division{% endblock %}
{% block breadcrumb %}
<li><a href="{% url 'division_index' %}">Divisions</a></li>
<li class="is-active"><a href="#" aria-current="page">New</a></li>
{% endblock %}
{% block content %}
<h1 class="title">Create a new division</h1>
<p class="subtitle is-6 has-text-grey">Slug is generated automatically.</p>

<div class="card">
  <div class="card-content">
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label class="label" for="div-name">Name</label>
        <div class="control">
          <input class="input" type="text" id="div-name" name="name" value="{{ name|default:'' }}" required autofocus>
        </div>
      </div>
      <div class="field is-grouped">
        <div class="control">
          <button class="button is-link" type="submit">Create division</button>
        </div>
        <div class="control">
          <a class="button is-light" href="{% url 'division_index' %}">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
