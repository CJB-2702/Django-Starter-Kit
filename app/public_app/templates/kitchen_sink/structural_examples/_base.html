{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Structural Example{% endblock %} — Kitchen Sink</title>
  <link rel="stylesheet" href="{% static 'css/bulma.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <script defer src="{% static 'js/htmx.min.js' %}"></script>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      background: var(--bulma-scheme-main-bis);
      color: var(--bulma-text);
      font-family: var(--bulma-family-sans-serif);
      font-size: 0.875rem;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Top nav ── */
    .app-topnav {
      display: flex;
      align-items: center;
      height: 3rem;
      background: var(--bulma-scheme-invert);
      color: var(--bulma-scheme-main);
      flex-shrink: 0;
      border-bottom: 1px solid var(--bulma-border);
      position: relative;
      z-index: 40;
    }
    .app-topnav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 1rem;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.05em;
      border-right: 1px solid rgba(255,255,255,0.12);
      height: 100%;
      white-space: nowrap;
    }
    .app-topnav-hamburger {
      display: flex; align-items: center;
      padding: 0 0.75rem; height: 100%;
      cursor: pointer; opacity: 0.7;
      border: none; background: none; color: inherit;
    }
    .app-topnav-hamburger:hover { opacity: 1; }

    .app-portals { display: flex; height: 100%; flex: 1; }
    .portal-tab {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0 1rem; height: 100%;
      font-size: 0.8rem; font-weight: 500;
      background: none; border: none;
      border-bottom: 3px solid transparent;
      color: rgba(255,255,255,0.65);
      cursor: pointer; white-space: nowrap;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .portal-tab:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .portal-tab.is-active {
      color: #fff;
      border-bottom-color: var(--bulma-primary);
      background: rgba(255,255,255,0.04);
    }
    .portal-tab .tab-icon { font-size: 0.9rem; opacity: 0.8; }
    .portal-tab .chevron { font-size: 0.65rem; opacity: 0.5; margin-left: 0.1rem; }

    .app-topnav-right {
      display: flex; align-items: center;
      height: 100%; padding-right: 0.5rem;
      border-left: 1px solid rgba(255,255,255,0.12);
    }
    .app-search-wrap input[type="text"] {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-right: none; color: #fff;
      padding: 0.35rem 0.75rem; font-size: 0.8rem;
      width: 14rem; outline: none;
    }
    .app-search-wrap input[type="text"]::placeholder { color: rgba(255,255,255,0.45); }
    .app-search-wrap input[type="text"]:focus {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.35);
    }
    .app-search-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.8);
      padding: 0.35rem 0.6rem; cursor: pointer; font-size: 0.85rem;
    }
    .app-search-btn:hover { background: rgba(255,255,255,0.22); }
    .app-user-btn {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0 0.85rem; height: 100%;
      background: none; border: none;
      border-left: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85); cursor: pointer; font-size: 0.8rem;
    }
    .app-user-btn:hover { background: rgba(255,255,255,0.06); }
    .app-user-avatar {
      width: 1.75rem; height: 1.75rem; border-radius: 50%;
      background: var(--bulma-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; color: #fff;
    }

    /* ── Portal dropdown ── */
    .portal-dropdown {
      display: none;
      background: var(--bulma-scheme-invert);
      border-bottom: 2px solid var(--bulma-primary);
      flex-shrink: 0;
      padding: 0.75rem 1.25rem;
      z-index: 30;
    }
    .portal-dropdown.is-open { display: block; }
    .portal-dropdown-inner { display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .portal-sublink {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0.4rem 0.85rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }
    .portal-sublink:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .portal-sublink.is-active { border-color: var(--bulma-primary); color: var(--bulma-primary); }
    .portal-sublink .icon { font-size: 0.85rem; opacity: 0.7; }
    .portal-dropdown-label {
      font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 0.5rem;
    }

    /* ── App shell (sidebar + scrollarea) ── */
    .app-shell {
      display: grid;
      grid-template-columns: 220px 1fr;        /* default: section nav + content */
      flex: 1;
      min-height: 0;        /* allow children to shrink so scroll works */
      overflow: hidden;
      transition: grid-template-columns 0.18s ease;
    }
    .app-shell.has-inpage-nav {
      grid-template-columns: 220px 180px 1fr;  /* + in-page nav (work portals only) */
    }
    .app-shell .app-inpage-nav { display: none; }
    .app-shell.has-inpage-nav .app-inpage-nav { display: block; }

    .app-topnav-hamburger.is-active {
      opacity: 1;
      background: rgba(255,255,255,0.08);
    }

    /* ── Sidebar nav toggle (||| Navigation bar) ── */
    .sidebar-nav-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.75rem;
      width: 100%;
      border: none;
      background: none;
      border-bottom: 1px solid var(--bulma-border-weak);
      color: var(--bulma-text-weak);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      text-align: left;
    }
    .sidebar-nav-toggle:hover { background: var(--bulma-background); color: var(--bulma-text); }
    .sidebar-toggle-bars { font-size: 0.9rem; opacity: 0.65; display: inline-block; transform: rotate(90deg); }
    .sidebar-nav-toggle .nav-expanded { display: flex; align-items: center; gap: 0.5rem; }
    .sidebar-nav-toggle .nav-collapsed { display: none; flex-direction: column; align-items: center; width: 100%; padding-top: 0.2rem; gap: 0.15rem; }
    .nav-collapsed-chevron { font-size: 0.85rem; font-weight: 700; line-height: 1; }
    .nav-collapsed-label {
      writing-mode: vertical-lr;
      text-orientation: upright;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      color: var(--bulma-text-weak);
      opacity: 0.55;
      margin-top: 0.2rem;
    }

    /* Collapsed sidebar — column shrinks to narrow width */
    .app-shell.is-sidebar-collapsed {
      grid-template-columns: 40px 1fr;
    }
    .app-shell.is-sidebar-collapsed.has-inpage-nav {
      grid-template-columns: 40px 180px 1fr;
    }
    .app-shell.is-sidebar-collapsed .app-sidebar {
      overflow: hidden;
      padding: 0;
      cursor: pointer;
    }
    .app-shell.is-sidebar-collapsed .app-sidebar > *:not(.sidebar-nav-toggle) {
      display: none !important;
    }
    .app-shell.is-sidebar-collapsed .sidebar-nav-toggle {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      padding: 0.5rem 0 0;
      border-bottom: none;
      gap: 0;
    }
    .app-shell.is-sidebar-collapsed .sidebar-nav-toggle .nav-expanded { display: none; }
    .app-shell.is-sidebar-collapsed .sidebar-nav-toggle .nav-collapsed { display: flex; }

    /* Left sidebar — fixed, independently scrollable, static while body scrolls */
    .app-sidebar {
      background: var(--bulma-scheme-main-bis);
      border-right: 1px solid var(--bulma-border);
      overflow-y: auto;
      padding: 1rem 0;
      min-width: 0;          /* allow grid cell to shrink to 0 cleanly */
    }

    /* Second left sidebar — in-page nav for work portals */
    .app-inpage-nav {
      background: var(--bulma-scheme-main);
      border-right: 1px solid var(--bulma-border);
      overflow-y: auto;
      padding: 1rem 0;
    }
    .inpage-nav-label {
      font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--bulma-text-weak);
      padding: 0 0.85rem 0.4rem;
      font-weight: 600;
    }
    .inpage-nav-link {
      display: block;
      padding: 0.3rem 0.85rem 0.3rem 1rem;
      font-size: 0.78rem;
      color: var(--bulma-text);
      border-left: 2px solid transparent;
    }
    .inpage-nav-link:hover {
      background: var(--bulma-scheme-main-bis);
      color: var(--bulma-text-strong);
      border-left-color: var(--bulma-border);
    }
    .inpage-nav-link.is-active {
      border-left-color: var(--bulma-primary);
      color: var(--bulma-link);
      font-weight: 600;
    }
    .sidebar-section-label {
      font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--bulma-text-weak);
      padding: 0.6rem 1rem 0.3rem;
      font-weight: 600;
    }
    .sidebar-link {
      display: block;
      padding: 0.3rem 1rem 0.3rem 1.25rem;
      font-size: 0.8rem;
      color: var(--bulma-text);
      border-left: 3px solid transparent;
    }
    .sidebar-link:hover {
      background: var(--bulma-background);
      color: var(--bulma-text-strong);
    }
    .sidebar-link.is-active {
      border-left-color: var(--bulma-primary);
      color: var(--bulma-link);
      background: var(--bulma-background);
      font-weight: 600;
    }
    .sidebar-divider {
      height: 1px; background: var(--bulma-border-weak); margin: 0.75rem 1rem;
    }

    /* Scroll area — body & rightrail scroll together inside this */
    .app-scrollarea {
      overflow-y: auto;
      background: var(--bulma-scheme-main-bis);
    }
    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 3rem;
    }

    /* ── Page hero (wraps title + actions + stat bar on work portals) ── */
    .page-hero {
      background: var(--bulma-scheme-main);
      border: 1px solid var(--bulma-border-weak);
      border-left: 4px solid var(--bulma-primary);
      padding: 1.5rem 1.75rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .page-hero .page-header  { margin-bottom: 1.25rem; }
    .page-hero .stat-bar     { margin-bottom: 0; }

    /* Buttons inside the hero are deliberately larger and prominent */
    .page-hero .page-header-actions .button {
      font-size: 0.95rem;
      padding: 0.55em 1.1em;
      height: auto;
      font-weight: 500;
    }
    .page-hero .page-header-icon {
      width: 3rem; height: 3rem;
      font-size: 1.9rem;
    }
    .page-hero .page-title    { font-size: 1.85rem; }
    .page-hero .page-subtitle { font-size: 0.9rem; margin-top: 0.3rem; }

    /* ── Page header (full width) ── */
    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; margin-bottom: 1rem;
    }
    .page-header-title-wrap { display: flex; align-items: center; gap: 0.65rem; }
    .page-header-icon {
      width: 2.4rem; height: 2.4rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--bulma-link);
      font-size: 1.5rem;
    }
    .page-title {
      font-size: 1.6rem; font-weight: 700;
      color: var(--bulma-text-strong); margin: 0; line-height: 1.1;
    }
    .page-subtitle {
      font-size: 0.82rem; color: var(--bulma-text-weak); margin-top: 0.2rem;
    }
    .page-header-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    /* ── Stat bar (full width quick details) ── */
    .stat-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .stat-card {
      background: var(--bulma-scheme-main);
      border: 1px solid var(--bulma-border-weak);
      padding: 0.85rem 1rem;
      position: relative;
    }
    .stat-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; bottom: 0; width: 3px;
    }
    .stat-card.accent-grey::before  { background: #888; }
    .stat-card.accent-blue::before  { background: var(--bulma-info); }
    .stat-card.accent-green::before { background: var(--bulma-success); }
    .stat-card.accent-red::before   { background: var(--bulma-danger); }
    .stat-card.accent-yellow::before{ background: var(--bulma-warning); }
    .stat-label { font-size: 0.72rem; color: var(--bulma-text-weak); margin-bottom: 0.3rem; }
    .stat-value { font-size: 1rem; font-weight: 600; color: var(--bulma-text-strong); }

    /* ── Two-column body (3/4 content + 1/4 quick actions) ── */
    .body-grid {
      display: grid;
      gap: 1.25rem;
      align-items: start;
    }
    .body-grid.has-rail   { grid-template-columns: 3fr 1fr; }
    .body-grid.full-width { grid-template-columns: 1fr; }

    .body-rail { display: flex; flex-direction: column; gap: 1rem; }

    /* ── Card pattern (used in all pages) ── */
    .pc {
      background: var(--bulma-scheme-main);
      border: 1px solid var(--bulma-border-weak);
      margin-bottom: 1rem;
    }
    .pc-header {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--bulma-border-weak);
      display: flex; align-items: center; justify-content: space-between;
      font-weight: 600;
      font-size: 0.88rem;
    }
    .pc-header-title { display: flex; align-items: center; gap: 0.45rem; }
    .pc-header-title .icon { color: var(--bulma-text-weak); font-size: 1rem; }
    .pc-body { padding: 1rem; }
    .pc-body.is-flush { padding: 0; }

    /* Rail (Quick Actions) heading style */
    .rail-label {
      font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--bulma-text-weak); font-weight: 600;
      margin-bottom: 0.5rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .rail-divider { height: 1px; background: var(--bulma-border-weak); margin: 0.85rem 0; }

    /* Pill-free buttons everywhere */
    .button { border-radius: 0; }
    .tag    { border-radius: 0; }
    .input, .select select, .textarea { border-radius: 0; }

    /* Detail-row (definition list style used in work portal) */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.9rem 1.5rem;
    }
    .detail-label { font-size: 0.72rem; color: var(--bulma-text-weak); font-weight: 600; margin-bottom: 0.15rem; }
    .detail-value { font-size: 0.88rem; color: var(--bulma-text-strong); }

    /* Anchor scroll targets — keep some breathing room from any sticky chrome */
    .anchor-target { scroll-margin-top: 1rem; }

    /* ks-note */
    .ks-note {
      font-size: 0.7rem; font-family: monospace; color: var(--bulma-text-weak);
      border: 1px dashed var(--bulma-border);
      padding: 0.3rem 0.5rem;
      background: var(--bulma-scheme-main-ter);
      display: inline-block;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--bulma-border); }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

<!-- ─── TOP NAV ─── -->
<nav class="app-topnav" role="navigation">
  <button class="app-topnav-hamburger" id="topnav-toggle" aria-label="Toggle top bar" onclick="toggleTopbar()">
    <span style="font-size:1.2rem;">☰</span>
  </button>
  <div class="app-topnav-brand">EBAMS</div>

  <div class="app-portals" role="tablist">
    <button class="portal-tab" data-portal="events"         onclick="activatePortal('events',this)">         <span class="tab-icon">↯</span> Events <span class="chevron">▾</span></button>
    <button class="portal-tab" data-portal="administration" onclick="activatePortal('administration',this)"> <span class="tab-icon">⚙</span> Administration <span class="chevron">▾</span></button>
    <button class="portal-tab" data-portal="assets"         onclick="activatePortal('assets',this)">         <span class="tab-icon">◈</span> Assets <span class="chevron">▾</span></button>
    <button class="portal-tab" data-portal="maintenance"    onclick="activatePortal('maintenance',this)">    <span class="tab-icon">⚒</span> Maintenance <span class="chevron">▾</span></button>
    <button class="portal-tab" data-portal="inventory"      onclick="activatePortal('inventory',this)">      <span class="tab-icon">▦</span> Inventory <span class="chevron">▾</span></button>
    <button class="portal-tab" data-portal="core"           onclick="activatePortal('core',this)">           <span class="tab-icon">⬡</span> Core <span class="chevron">▾</span></button>
  </div>

  <div class="app-topnav-right">
    <div class="app-search-wrap">
      <input type="text" placeholder="Search…">
      <button class="app-search-btn">⌕</button>
    </div>
    <button class="app-user-btn">
      <div class="app-user-avatar">GU</div>
      <span>Generic_User</span>
      <span style="font-size:0.65rem; opacity:0.5;">▾</span>
    </button>
  </div>
</nav>

<!-- ─── PORTAL DROPDOWN ─── -->
<div class="portal-dropdown" id="portal-dropdown">
  <p class="portal-dropdown-label" id="portal-dropdown-label"></p>
  <div class="portal-dropdown-inner" id="portal-dropdown-links"></div>
</div>

<!-- ─── SHELL ─── -->
<div class="app-shell {% block shell_class %}{% endblock %}">
  <aside class="app-sidebar" aria-label="Section navigation">
    <button class="sidebar-nav-toggle" onclick="toggleSidebar(event)">
      <span class="nav-expanded">
        <span class="sidebar-toggle-bars">|||</span>
        <span>Navigation</span>
      </span>
      <span class="nav-collapsed">
        <span class="nav-collapsed-chevron">›</span>
        <span class="nav-collapsed-label">Navigation</span>
      </span>
    </button>
    {% block sidebar %}{% endblock %}
  </aside>

  <aside class="app-inpage-nav" aria-label="In-page navigation">
    {% block inpage_nav %}{% endblock %}
  </aside>

  <div class="app-scrollarea">
    <div class="app-container">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<!-- ─── PORTAL JS ─── -->
<script>
  const PORTAL_DATA = {
    events: { label: 'Events', links: [
      { label: 'All Events', icon: '↯' },
      { label: 'Maintenance Events', icon: '⚒' },
      { label: 'Inspection Events', icon: '✔' },
      { label: 'Calibration', icon: '⚖' },
      { label: 'Event Templates', icon: '▣' },
      { label: 'Reports', icon: '⊞' },
    ]},
    administration: { label: 'Administration', links: [
      { label: 'Users', icon: '👤' },
      { label: 'Roles', icon: '🔑' },
      { label: 'Domain Templates', icon: '⊡' },
      { label: 'Domains', icon: '◈' },
      { label: 'Audit Log', icon: '📋' },
      { label: 'Password Policy', icon: '🔒' },
    ]},
    assets: { label: 'Assets', links: [
      { label: 'All Assets', icon: '◈' },
      { label: 'Asset Groups', icon: '▦' },
      { label: 'Categories', icon: '⊞' },
      { label: 'Import/Export', icon: '⇅' },
    ]},
    maintenance: { label: 'Maintenance', links: [
      { label: 'Work Orders', icon: '⚒' },
      { label: 'Scheduled', icon: '📅' },
      { label: 'Procedures', icon: '📋' },
      { label: 'Parts Requests', icon: '⬡' },
      { label: 'Technicians', icon: '👷' },
    ]},
    inventory: { label: 'Inventory', links: [
      { label: 'Stock Levels', icon: '▦' },
      { label: 'Locations', icon: '📍' },
      { label: 'Part Numbers', icon: '⊡' },
      { label: 'Transfers', icon: '⇄' },
      { label: 'Part Demands', icon: '⊟', active: true },
    ]},
    core: { label: 'Core', links: [
      { label: 'Org Chart', icon: '⬡' },
      { label: 'Divisions', icon: '◈' },
      { label: 'System Info', icon: 'ℹ' },
    ]},
  };

  const INITIAL_PORTAL = "{% block active_portal %}administration{% endblock %}";
  const INITIAL_SUBLINK = "{% block active_sublink %}{% endblock %}";
  let _activePortal = null;
  let _lastPortal   = null;

  function renderDropdown(key) {
    const portal = PORTAL_DATA[key];
    document.getElementById('portal-dropdown-label').textContent = portal.label;
    document.getElementById('portal-dropdown-links').innerHTML = portal.links.map(l => `
      <a class="portal-sublink${(INITIAL_SUBLINK && INITIAL_SUBLINK === l.label) ? ' is-active' : ''}" href="#">
        <span class="icon">${l.icon}</span>${l.label}
      </a>
    `).join('');
  }

  function activatePortal(key, tabEl) {
    const dd  = document.getElementById('portal-dropdown');
    const btn = document.getElementById('topnav-toggle');
    if (_activePortal === key && dd.classList.contains('is-open')) {
      _lastPortal = key;
      dd.classList.remove('is-open');
      tabEl.classList.remove('is-active');
      _activePortal = null;
      btn.classList.remove('is-active');
      return;
    }
    document.querySelectorAll('.portal-tab').forEach(t => t.classList.remove('is-active'));
    tabEl.classList.add('is-active');
    _lastPortal = _activePortal = key;
    renderDropdown(key);
    dd.classList.add('is-open');
    btn.classList.add('is-active');
  }

  // Hamburger — second path to toggle the portal dropdown open/closed.
  // Remembers the last open portal so double-click reopens it.
  function toggleTopbar() {
    const dd  = document.getElementById('portal-dropdown');
    const btn = document.getElementById('topnav-toggle');
    if (dd.classList.contains('is-open')) {
      _lastPortal = _activePortal;
      dd.classList.remove('is-open');
      document.querySelectorAll('.portal-tab').forEach(t => t.classList.remove('is-active'));
      _activePortal = null;
      btn.classList.remove('is-active');
    } else if (_lastPortal) {
      _activePortal = _lastPortal;
      renderDropdown(_activePortal);
      dd.classList.add('is-open');
      document.querySelector(`.portal-tab[data-portal="${_activePortal}"]`)?.classList.add('is-active');
      btn.classList.add('is-active');
    }
  }

  // Sidebar ||| Navigation bar — collapses/expands the sidebar
  function toggleSidebar(e) {
    if (e) e.stopPropagation();
    const shell = document.querySelector('.app-shell');
    shell.classList.toggle('is-sidebar-collapsed');
  }

  // Initial state
  window.addEventListener('DOMContentLoaded', () => {
    const shell   = document.querySelector('.app-shell');
    const sidebar = document.querySelector('.app-sidebar');

    // Click anywhere on collapsed sidebar to expand it (excluding the toggle button itself)
    sidebar.addEventListener('click', (e) => {
      if (shell.classList.contains('is-sidebar-collapsed') && !e.target.closest('.sidebar-nav-toggle')) {
        shell.classList.remove('is-sidebar-collapsed');
      }
    });

    const initialTab = document.querySelector(`.portal-tab[data-portal="${INITIAL_PORTAL}"]`);
    if (initialTab) {
      initialTab.classList.add('is-active');
      _activePortal = INITIAL_PORTAL;
      renderDropdown(INITIAL_PORTAL);
      document.getElementById('portal-dropdown').classList.add('is-open');
    }

    // In-page nav: hijack hash clicks so they scroll the scrollarea, not the window
    const scrollarea = document.querySelector('.app-scrollarea');
    document.querySelectorAll('.inpage-nav-link[href^="#"]').forEach(link => {
      link.addEventListener('click', (e) => {
        const id = link.getAttribute('href').slice(1);
        const target = document.getElementById(id);
        if (target && scrollarea) {
          e.preventDefault();
          const top = target.offsetTop - 16;
          scrollarea.scrollTo({ top, behavior: 'smooth' });
        }
      });
    });

    // Highlight whichever section is at the top of the scrollarea
    if (scrollarea) {
      const links = Array.from(document.querySelectorAll('.inpage-nav-link[href^="#"]'));
      const targets = links
        .map(l => ({ link: l, el: document.getElementById(l.getAttribute('href').slice(1)) }))
        .filter(x => x.el);
      const onScroll = () => {
        const probe = scrollarea.scrollTop + 24;
        let current = targets[0];
        for (const t of targets) {
          if (t.el.offsetTop <= probe) current = t;
        }
        links.forEach(l => l.classList.remove('is-active'));
        if (current) current.link.classList.add('is-active');
      };
      scrollarea.addEventListener('scroll', onScroll, { passive: true });
    }
  });
</script>

</body>
