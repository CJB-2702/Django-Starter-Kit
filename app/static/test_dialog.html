<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dialog Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <section class="section">
    <div class="container">
      <h1 class="title">Dialog Demo</h1>

      <button class="button is-primary" commandfor="demo-dialog" command="show-modal">
        Open Dialog
      </button>

        <dialog id="demo-dialog" class="card" style="padding:0">

            <header class="card-header">
              <p class="card-header-title">Confirm Action</p>
              
                <button class="delete is-large" aria-label="close" commandfor="demo-dialog" command="close" ></button>
              </form>
            </header>
            <div class="card-content">
              <div class="content">
                <p>This is a demo dialog showing a Bulma card inside a dialog element with action buttons.</p>
              </div>
            </div>
            <footer class="card-footer custom-card-footer">
              <div class="card-footer-secondaries">
                <button type="submit" class="button is-small is-light" value="cancel" commandfor="demo-dialog" command="close">Cancel</button>
                <button type="reset" class="button is-small is-light">Reset</button>
                <button type="submit" class="button is-small is-danger is-light" value="delete" onclick="return confirm('Delete this item?');">Delete</button>
              </div>
              <button type="submit" class="button is-primary card-footer-primary" commandfor="demo-dialog" command="close">Save</button>
            </footer>
        </dialog>
    </div>
  </section>
</body>
</html>
