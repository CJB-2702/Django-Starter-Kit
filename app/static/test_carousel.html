<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Carousel Test</title>
  <link rel="stylesheet" href="css/bulma.min.css">
  <link rel="stylesheet" href="css/app.css">
  <style>
    body { padding: 2rem; }
    .test-section { margin: 2rem 0; }
  </style>
</head>
<body>

<h1 class="title">Image Carousel Component Test</h1>

<div class="test-section">
  <h2 class="subtitle is-5">Default dimensions (300x300)</h2>
  <image-carousel>
    <img src="https://via.placeholder.com/300x200?text=Image+1" alt="Test Image 1">
    <img src="https://via.placeholder.com/300x200?text=Image+2" alt="Test Image 2">
    <img src="https://via.placeholder.com/300x200?text=Image+3" alt="Test Image 3">
  </image-carousel>
</div>

<div class="test-section">
  <h2 class="subtitle is-5">Custom dimensions (400x250)</h2>
  <image-carousel preview-height="250" preview-width="400">
    <img src="https://via.placeholder.com/400x250?text=Wide+Image+1" alt="Wide Image 1">
    <img src="https://via.placeholder.com/400x250?text=Wide+Image+2" alt="Wide Image 2">
  </image-carousel>
</div>

<div class="test-section">
  <h2 class="subtitle is-5">Single image (no navigation)</h2>
  <image-carousel>
    <img src="https://via.placeholder.com/300x200?text=Single+Image" alt="Single Image">
  </image-carousel>
</div>

<script src="web_components/image_carousel.js"></script>

</body>
</html>
