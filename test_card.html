<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card Footer Test</title>
  <link rel="stylesheet" href="app/static/css/bulma.min.css">
  <link rel="stylesheet" href="app/static/css/app.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <style>
    body {
      padding: 2rem;
    }
  </style>
</head>
<body>
<div class="card mb-4" style="max-width: 600px;">
  <div class="card-content">
    <div class="is-flex is-align-items-center mb-3" style="gap: 0.5rem;">
      <span class="tag is-light is-small">Generic</span>
      <span class="is-size-7 has-text-grey">
        North Acme Ltd — Site A · Created 2026-05-09 23:59 by generic_admin
      </span>
    </div>

    <p class="is-size-7 mb-4">nvbv</p>

    <div class="columns is-size-7">
      <div class="column">
        <p class="has-text-grey mb-1">Status</p>
        <p><strong>Planned</strong></p>
      </div>
      <div class="column">
        <p class="has-text-grey mb-1">Priority</p>
        <p><strong>Low</strong></p>
      </div>
      <div class="column">
        <p class="has-text-grey mb-1">Start</p>
        <p><strong>2026-05-15 16:59</strong></p>
      </div>
      <div class="column">
        <p class="has-text-grey mb-1">End</p>
        <p><strong>—</strong></p>
      </div>
    </div>
  </div>

  <footer class="card-footer card-footer-actions" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
    <div class="card-footer-secondaries">
      <form method="post" action="/events/QM52r58Z/delete/" style="margin: 0;">
        <button class="button is-small is-danger is-light" type="submit" onclick="return confirm('Delete this event?');">
          <span class="icon"><span class="material-icons" aria-hidden="true">delete</span></span>
          <span>Delete</span>
        </button>
      </form>
    </div>
    <a href="/events/QM52r58Z/edit/" class="button is-small is-info is-light" style="width: 100%;">
      <span class="icon"><span class="material-icons" aria-hidden="true">edit</span></span>
      <span>Edit</span>
    </a>
  </footer>
</div>

</body>
</html>
